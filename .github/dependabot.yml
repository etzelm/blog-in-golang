# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "gomod" # See documentation for possible values
    directory: "/blog" # Location of package manifests
    schedule:
      interval: "daily"
  # /daemon is its own module that `replace`s ../blog. Without its own entry,
  # its indirect deps drift behind /blog's daily bumps until the module won't
  # load without a manual `go mod tidy`. Watch it too so Dependabot keeps it
  # in sync (direct: aws-sdk-go v1, logrus; the local blog replace is ignored).
  - package-ecosystem: "gomod"
    directory: "/daemon"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/realtor" # Location of package manifests
    schedule:
      interval: "daily"
